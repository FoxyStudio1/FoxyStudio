<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FoxyStudio</title>
  <link href="https://fonts.googleapis.com/css2?family=VT323&family=Share+Tech+Mono&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #000000;
      --text: #c8c8c8;
      --accent: #8b0000;
      --dim: #3a3a3a;
      --glow: rgba(139,0,0,0.4);
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width:100%; height:100%; background:var(--bg); color:var(--text); font-family:'Share Tech Mono',monospace; overflow-x:hidden; }

    #noise-canvas { position:fixed; inset:0; width:100%; height:100%; pointer-events:none; z-index:1; opacity:0.045; mix-blend-mode:screen; }

    body::after {
      content:''; position:fixed; inset:0; pointer-events:none; z-index:2;
      background: repeating-linear-gradient(to bottom, transparent 0px, transparent 2px, rgba(0,0,0,0.15) 2px, rgba(0,0,0,0.15) 4px);
    }
    body::before {
      content:''; position:fixed; inset:0; pointer-events:none; z-index:2;
      background: radial-gradient(ellipse at center, transparent 38%, rgba(0,0,0,0.88) 100%);
    }

    #app {
      position:relative; z-index:10; min-height:100vh;
      display:flex; flex-direction:column; align-items:center; justify-content:center;
      padding:40px 20px 120px;
    }

    #post-container {
      max-width:680px; width:100%; text-align:center;
      animation: flicker-in 1.4s ease forwards;
    }

    @keyframes flicker-in {
      0%   { opacity:0; }
      8%   { opacity:0.3; }
      10%  { opacity:0; }
      18%  { opacity:0.6; }
      20%  { opacity:0.05; }
      32%  { opacity:0.85; }
      34%  { opacity:0.1; }
      48%  { opacity:0.95; }
      50%  { opacity:0.4; }
      65%  { opacity:1; }
      100% { opacity:1; }
    }

    .block { margin:22px 0; }

    .block-text {
      font-family:'VT323',monospace;
      font-size:clamp(1.1rem,2.5vw,1.45rem);
      line-height:1.75; color:var(--text);
      text-shadow:0 0 10px rgba(200,200,200,0.18);
      white-space:pre-wrap; word-break:break-word;
    }

    .block-image img {
      max-width:100%; max-height:72vh; display:block; margin:0 auto;
      filter:brightness(0.9) contrast(1.1);
      box-shadow:0 0 60px rgba(0,0,0,0.95), 0 0 20px rgba(0,0,0,0.8);
    }

    .block-audio { display:flex; align-items:center; gap:12px; justify-content:center; flex-wrap:wrap; }
    .block-audio .audio-label { font-family:'VT323',monospace; font-size:1rem; color:#555; text-transform:uppercase; letter-spacing:2px; }
    .block-audio audio { height:28px; opacity:0.6; transition:opacity 0.2s; }
    .block-audio audio:hover { opacity:1; }

    .block-progress { text-align:center; padding:8px 0; }
    .progress-label { font-family:'VT323',monospace; font-size:0.9rem; color:#3a3a3a; text-transform:uppercase; letter-spacing:3px; margin-bottom:10px; }
    .progress-track { width:100%; max-width:420px; height:5px; background:#0e0e0e; border:1px solid #1c1c1c; margin:0 auto; position:relative; overflow:hidden; }
    .progress-fill { height:100%; background:linear-gradient(90deg,#3a0000,var(--accent)); box-shadow:0 0 12px var(--glow); transition:width 1.5s cubic-bezier(0.23,1,0.32,1); }
    .progress-value { font-family:'VT323',monospace; font-size:0.82rem; color:#3a3a3a; margin-top:6px; letter-spacing:2px; }

    .block-divider { width:50px; height:1px; background:#111; margin:28px auto; }

    #empty-state { text-align:center; }
    .dot-anim { font-family:'VT323',monospace; font-size:4rem; color:#141414; letter-spacing:14px; animation:pulse-dots 5s ease-in-out infinite; }
    @keyframes pulse-dots { 0%,100%{opacity:0.15;} 50%{opacity:0.45;} }

    #bottom-area {
      position:fixed; bottom:0; left:0; right:0; z-index:20;
      padding:18px 20px; display:flex; flex-direction:column; align-items:center; gap:9px;
      background:linear-gradient(to top, rgba(0,0,0,0.97) 55%, transparent);
    }

    #extra-buttons { display:flex; flex-wrap:wrap; gap:8px; justify-content:center; }

    .btn-extra {
      font-family:'VT323',monospace; font-size:0.82rem; letter-spacing:2px; text-transform:uppercase;
      color:#383838; text-decoration:none; border:1px solid #151515; padding:4px 14px;
      cursor:pointer; transition:all 0.2s; background:transparent;
    }
    .btn-extra:hover { color:#777; border-color:#2e2e2e; }

    #btn-projetos {
      font-family:'VT323',monospace; font-size:1.1rem; letter-spacing:4px; text-transform:uppercase;
      color: var(--btn-color, #aaaaaa);
      border: 1px solid var(--btn-border, #666666);
      padding:10px 38px;
      cursor:pointer; background:transparent; transition:all 0.35s; position:relative; outline:none;
      text-shadow: 0 0 8px var(--btn-glow, rgba(170,170,170,0.2));
    }
    #btn-projetos::after {
      content:''; position:absolute; inset:-4px; border:1px solid transparent; transition:all 0.35s;
    }
    #btn-projetos:hover {
      color: var(--btn-hover-color, #ffffff);
      border-color: var(--btn-color, #aaaaaa);
      box-shadow: 0 0 20px var(--btn-glow, rgba(170,170,170,0.12));
      text-shadow: 0 0 16px var(--btn-glow, rgba(255,255,255,0.35));
    }
    #btn-projetos:hover::after { border-color: var(--btn-border, #666); }

    #modal-overlay {
      display:none; position:fixed; inset:0; background:rgba(0,0,0,0.96); z-index:100;
      align-items:center; justify-content:center;
    }
    #modal-overlay.open { display:flex; animation:fade-in 0.25s ease; }
    @keyframes fade-in { from{opacity:0;} to{opacity:1;} }

    #modal-box {
      max-width:460px; width:90%; border:1px solid #181818; padding:36px 28px;
      background:#020202; position:relative;
    }
    #modal-title { font-family:'VT323',monospace; font-size:0.9rem; letter-spacing:5px; text-transform:uppercase; color:#242424; margin-bottom:24px; text-align:center; }
    #modal-close { position:absolute; top:12px; right:16px; font-family:'VT323',monospace; font-size:1.1rem; color:#2a2a2a; cursor:pointer; background:none; border:none; transition:color 0.2s; }
    #modal-close:hover { color:#777; }

    #projetos-list { list-style:none; }
    #projetos-list li { border-bottom:1px solid #0c0c0c; }
    #projetos-list li:last-child { border-bottom:none; }
    #projetos-list a { display:block; padding:13px 0; font-family:'VT323',monospace; font-size:1.05rem; letter-spacing:2px; color:#484848; text-decoration:none; transition:all 0.2s; }
    #projetos-list a:hover { color:var(--text); padding-left:8px; }
  </style>
</head>
<body>
  <canvas id="noise-canvas"></canvas>

  <div id="app">
    <div id="post-container">
      <div class="dot-anim">. . .</div>
    </div>
  </div>

  <div id="bottom-area">
    <div id="extra-buttons"></div>
    <button id="btn-projetos">outros projetos</button>
  </div>

  <div id="modal-overlay">
    <div id="modal-box">
      <button id="modal-close">✕</button>
      <div id="modal-title">Outros Projetos</div>
      <ul id="projetos-list"></ul>
    </div>
  </div>

  <script>
    // ═══ CONFIG — O manager irá preencher o BIN_ID automaticamente ═══
    const JSONBIN_KEY = '$2a$10$ufgzQUfgCs2fLK8dtBAKnuhTaok9s1.P2IwWlPX8is64S4VopQvsy';

    // ═══ NOISE ═══
    (function() {
      const c = document.getElementById('noise-canvas');
      const x = c.getContext('2d');
      function resize() { c.width = innerWidth; c.height = innerHeight; }
      function draw() {
        if (!c.width || !c.height) return;
        const img = x.createImageData(c.width, c.height);
        const d = img.data;
        for (let i = 0; i < d.length; i += 4) {
          const v = Math.random() * 255 | 0;
          d[i] = d[i+1] = d[i+2] = v; d[i+3] = 20;
        }
        x.putImageData(img, 0, 0);
      }
      resize(); window.addEventListener('resize', resize);
      setInterval(draw, 65); draw();
    })();

    // ═══ API ═══
    async function fetchData() {
      const id = localStorage.getItem('foxy_bin_id');
      if (!id) return null;
      try {
        const r = await fetch(`https://api.jsonbin.io/v3/b/${id}/latest`, {
          headers: { 'X-Master-Key': JSONBIN_KEY }
        });
        if (!r.ok) return null;
        return (await r.json()).record;
      } catch { return null; }
    }

    // ═══ RENDER ═══
    function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
    function escA(s) { return String(s||'').replace(/"/g,'&quot;').replace(/'/g,'&#39;'); }

    function renderBlock(b) {
      switch(b.type) {
        case 'text':
          return `<div class="block block-text">${esc(b.content)}</div>`;
        case 'image':
          return b.src ? `<div class="block block-image"><img src="${escA(b.src)}" alt="" loading="lazy"></div>` : '';
        case 'audio':
          return b.src ? `<div class="block block-audio">${b.label?`<span class="audio-label">${esc(b.label)}</span>`:''}<audio controls src="${escA(b.src)}"></audio></div>` : '';
        case 'progress':
          const v = Math.min(100, Math.max(0, b.value||0));
          return `<div class="block block-progress">${b.label?`<div class="progress-label">${esc(b.label)}</div>`:''}<div class="progress-track"><div class="progress-fill" data-val="${v}" style="width:0%"></div></div><div class="progress-value">${v}%</div></div>`;
        case 'divider':
          return `<div class="block-divider"></div>`;
        default: return '';
      }
    }

    function applySettings(s) {
      if (!s) return;
      if (s.backgroundType === 'image' && s.backgroundValue) {
        document.body.style.cssText += `;background-image:url('${escA(s.backgroundValue)}');background-size:cover;background-position:center;background-attachment:fixed;`;
      } else if (s.backgroundType === 'color' && s.backgroundValue) {
        document.body.style.background = s.backgroundValue;
        document.documentElement.style.setProperty('--bg', s.backgroundValue);
      }
      if (s.btnColor) {
        const r = document.documentElement;
        r.style.setProperty('--btn-color',  s.btnColor);
        r.style.setProperty('--btn-border', s.btnColor + '99');
        r.style.setProperty('--btn-glow',   s.btnColor + '44');
        r.style.setProperty('--btn-hover-color', '#ffffff');
      }
    }

    function renderPost(post) {
      const c = document.getElementById('post-container');
      if (!post || !post.blocks || !post.blocks.length) {
        c.innerHTML = '<div class="dot-anim">. . .</div>'; return;
      }
      c.innerHTML = post.blocks.map(renderBlock).join('');
      setTimeout(() => {
        c.querySelectorAll('.progress-fill[data-val]').forEach(el => {
          el.style.width = el.dataset.val + '%';
        });
      }, 200);
    }

    function renderProjectos(list) {
      const ul = document.getElementById('projetos-list');
      if (!list || !list.length) {
        ul.innerHTML = '<li style="font-family:VT323,monospace;color:#222;padding:12px 0;letter-spacing:2px;">Sem projetos</li>'; return;
      }
      ul.innerHTML = list.map(p => `<li><a href="${escA(p.url)}" target="_blank" rel="noopener">${esc(p.name)}</a></li>`).join('');
    }

    function renderExtraButtons(btns) {
      const area = document.getElementById('extra-buttons');
      area.innerHTML = (btns||[]).map(b => `<a class="btn-extra" href="${escA(b.url)}" target="_blank" rel="noopener">${esc(b.label)}</a>`).join('');
    }

    // ═══ MODAL ═══
    document.getElementById('btn-projetos').onclick = () => document.getElementById('modal-overlay').classList.add('open');
    document.getElementById('modal-close').onclick = () => document.getElementById('modal-overlay').classList.remove('open');
    document.getElementById('modal-overlay').onclick = e => { if(e.target===document.getElementById('modal-overlay')) document.getElementById('modal-overlay').classList.remove('open'); };
    document.addEventListener('keydown', e => { if(e.key==='Escape') document.getElementById('modal-overlay').classList.remove('open'); });

    // ═══ INIT ═══
    (async () => {
      const data = await fetchData();
      const fallback = { projetos:[{id:'p1',name:'ARG do Lifecraft',url:'https://foxystudio1.github.io/PC-antigo/'}] };
      const d = data || fallback;
      applySettings(d.settings);
      renderPost(d.post);
      renderProjectos(d.projetos || fallback.projetos);
      renderExtraButtons(d.extraButtons);
    })();
  </script>

  <script>
    // ═══ BLOCK INSPECT ═══
    // Disable right-click
    document.addEventListener('contextmenu', e => e.preventDefault());

    // Block F12, Ctrl+Shift+I/J/C/U, Ctrl+U
    document.addEventListener('keydown', e => {
      if (
        e.key === 'F12' ||
        (e.ctrlKey && e.shiftKey && ['I','i','J','j','C','c'].includes(e.key)) ||
        (e.ctrlKey && ['U','u'].includes(e.key))
      ) {
        e.preventDefault();
        return false;
      }
    });

    // Devtools open detection (size method)
    (function() {
      const threshold = 160;
      function check() {
        if (
          window.outerWidth - window.innerWidth > threshold ||
          window.outerHeight - window.innerHeight > threshold
        ) {
          document.body.innerHTML = '';
        }
      }
      setInterval(check, 1000);
    })();
  </script>
</body>
</html>
