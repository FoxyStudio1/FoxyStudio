<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FoxyStudio</title>
  <link href="https://fonts.googleapis.com/css2?family=VT323&family=Share+Tech+Mono&display=swap" rel="stylesheet">
  <style>
    :root{--bg:#000;--text:#c8c8c8;--accent:#8b0000;--btn-color:#aaaaaa;--btn-border:#666;--btn-glow:rgba(170,170,170,0.2);}
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    html,body{width:100%;height:100%;background:var(--bg);color:var(--text);font-family:"Share Tech Mono",monospace;overflow-x:hidden;}
    #noise{position:fixed;inset:0;width:100%;height:100%;pointer-events:none;z-index:1;opacity:0.045;}
    body::after{content:"";position:fixed;inset:0;pointer-events:none;z-index:2;background:repeating-linear-gradient(to bottom,transparent 0px,transparent 2px,rgba(0,0,0,0.15) 2px,rgba(0,0,0,0.15) 4px);}
    body::before{content:"";position:fixed;inset:0;pointer-events:none;z-index:2;background:radial-gradient(ellipse at center,transparent 38%,rgba(0,0,0,0.88) 100%);}
    #app{position:relative;z-index:10;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 20px 120px;}
    #post{max-width:680px;width:100%;text-align:center;animation:flicker 1.4s ease forwards;}
    @keyframes flicker{0%{opacity:0}8%{opacity:.3}10%{opacity:0}20%{opacity:.6}22%{opacity:.05}35%{opacity:.9}37%{opacity:.1}50%{opacity:.95}52%{opacity:.4}65%{opacity:1}100%{opacity:1}}
    .blk{margin:22px 0;}
    .blk-text{font-family:"VT323",monospace;font-size:clamp(1.1rem,2.5vw,1.45rem);line-height:1.75;color:var(--text);text-shadow:0 0 10px rgba(200,200,200,0.18);white-space:pre-wrap;word-break:break-word;}
    .blk-image img{max-width:100%;max-height:72vh;display:block;margin:0 auto;filter:brightness(.9) contrast(1.1);box-shadow:0 0 60px rgba(0,0,0,.95);}
    .blk-audio{display:flex;align-items:center;gap:12px;justify-content:center;flex-wrap:wrap;}
    .blk-audio .lbl{font-family:"VT323",monospace;font-size:1rem;color:#555;text-transform:uppercase;letter-spacing:2px;}
    .blk-audio audio{height:28px;opacity:.6;}
    .blk-audio audio:hover{opacity:1;}
    .blk-prog{text-align:center;padding:8px 0;}
    .blk-prog .plbl{font-family:"VT323",monospace;font-size:.9rem;color:#3a3a3a;text-transform:uppercase;letter-spacing:3px;margin-bottom:10px;}
    .blk-prog .track{width:100%;max-width:420px;height:5px;background:#0e0e0e;border:1px solid #1c1c1c;margin:0 auto;overflow:hidden;}
    .blk-prog .fill{height:100%;background:linear-gradient(90deg,#3a0000,var(--accent));box-shadow:0 0 12px rgba(139,0,0,.4);transition:width 1.5s cubic-bezier(.23,1,.32,1);}
    .blk-prog .pval{font-family:"VT323",monospace;font-size:.82rem;color:#3a3a3a;margin-top:6px;letter-spacing:2px;}
    .blk-div{width:50px;height:1px;background:#111;margin:28px auto;}
    .dots{font-family:"VT323",monospace;font-size:4rem;color:#141414;letter-spacing:14px;animation:pd 5s ease-in-out infinite;}
    @keyframes pd{0%,100%{opacity:.15}50%{opacity:.45}}
    #bottom{position:fixed;bottom:0;left:0;right:0;z-index:20;padding:18px 20px;display:flex;flex-direction:column;align-items:center;gap:9px;background:linear-gradient(to top,rgba(0,0,0,.97) 55%,transparent);}
    #xbtns{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;}
    .xbtn{font-family:"VT323",monospace;font-size:.85rem;letter-spacing:2px;text-transform:uppercase;color:#484848;text-decoration:none;border:1px solid #1e1e1e;padding:5px 14px;cursor:pointer;transition:all .2s;background:transparent;}
    .xbtn:hover{color:#888;border-color:#333;}
    #btnp{font-family:"VT323",monospace;font-size:1.1rem;letter-spacing:4px;text-transform:uppercase;color:var(--btn-color);border:1px solid var(--btn-border);padding:10px 38px;cursor:pointer;background:transparent;transition:all .35s;position:relative;outline:none;text-shadow:0 0 8px var(--btn-glow);}
    #btnp::after{content:"";position:absolute;inset:-4px;border:1px solid transparent;transition:all .35s;}
    #btnp:hover{color:#fff;border-color:var(--btn-color);box-shadow:0 0 20px var(--btn-glow);text-shadow:0 0 16px rgba(255,255,255,.35);}
    #btnp:hover::after{border-color:var(--btn-border);}
    #overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.96);z-index:100;align-items:center;justify-content:center;}
    #overlay.open{display:flex;animation:fi .25s ease;}
    @keyframes fi{from{opacity:0}to{opacity:1}}
    #mbox{max-width:460px;width:90%;border:1px solid #181818;padding:36px 28px;background:#020202;position:relative;}
    #mtitle{font-family:"VT323",monospace;font-size:.9rem;letter-spacing:5px;text-transform:uppercase;color:#242424;margin-bottom:24px;text-align:center;}
    #mclose{position:absolute;top:12px;right:16px;font-family:"VT323",monospace;font-size:1.1rem;color:#2a2a2a;cursor:pointer;background:none;border:none;transition:color .2s;}
    #mclose:hover{color:#777;}
    #plist{list-style:none;}
    #plist li{border-bottom:1px solid #0c0c0c;}
    #plist li:last-child{border-bottom:none;}
    #plist a{display:block;padding:13px 0;font-family:"VT323",monospace;font-size:1.05rem;letter-spacing:2px;color:#484848;text-decoration:none;transition:all .2s;}
    #plist a:hover{color:var(--text);padding-left:8px;}
  </style>
</head>
<body>
  <canvas id="noise"></canvas>
  <div id="app"><div id="post"><div class="dots">. . .</div></div></div>
  <div id="bottom"><div id="xbtns"></div><button id="btnp">outros projetos</button></div>
  <div id="overlay"><div id="mbox"><button id="mclose">&#x2715;</button><div id="mtitle">Outros Projetos</div><ul id="plist"></ul></div></div>
  <script>
    var KEY="$2a$10$ufgzQUfgCs2fLK8dtBAKnuhTaok9s1.P2IwWlPX8is64S4VopQvsy";
    var BIN="69d80d92856a68218917e963";
    (function(){
      var c=document.getElementById("noise"),x=c.getContext("2d");
      function rs(){c.width=innerWidth;c.height=innerHeight;}
      function dr(){if(!c.width||!c.height)return;var img=x.createImageData(c.width,c.height),d=img.data;for(var i=0;i<d.length;i+=4){var v=Math.random()*255|0;d[i]=d[i+1]=d[i+2]=v;d[i+3]=20;}x.putImageData(img,0,0);}
      rs();addEventListener("resize",rs);setInterval(dr,65);dr();
    })();
    function eh(s){return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");}
    function ea(s){return String(s||"").replace(/"/g,"&quot;");}
    function applySettings(s){
      if(!s)return;
      if(s.backgroundType==="image"&&s.backgroundValue){document.body.style.backgroundImage="url("+ea(s.backgroundValue)+")";document.body.style.backgroundSize="cover";document.body.style.backgroundPosition="center";document.body.style.backgroundAttachment="fixed";}
      else if(s.backgroundType==="color"&&s.backgroundValue){document.body.style.background=s.backgroundValue;document.documentElement.style.setProperty("--bg",s.backgroundValue);}
      if(s.btnColor){var r=document.documentElement;r.style.setProperty("--btn-color",s.btnColor);r.style.setProperty("--btn-border",s.btnColor);}
    }
    function renderBlock(b){
      if(b.type==="text")return'<div class="blk blk-text">'+eh(b.content||"")+'</div>';
      if(b.type==="image")return b.src?'<div class="blk blk-image"><img src="'+ea(b.src)+'" alt="" loading="lazy"></div>':"" ;
      if(b.type==="audio")return b.src?'<div class="blk blk-audio">'+(b.label?'<span class="lbl">'+eh(b.label)+'</span>':"")+'<audio controls src="'+ea(b.src)+"\"></audio></div>":"";
      if(b.type==="progress"){var v=Math.min(100,Math.max(0,b.value||0));return'<div class="blk blk-prog">'+(b.label?'<div class="plbl">'+eh(b.label)+'</div>':"")+'<div class="track"><div class="fill" data-v="'+v+'" style="width:0%"></div></div><div class="pval">'+v+'%</div></div>';}
      if(b.type==="divider")return'<div class="blk-div"></div>';
      return"";
    }
    function renderPost(post){
      var c=document.getElementById("post");
      if(!post||!post.blocks||!post.blocks.length){c.innerHTML='<div class="dots">. . .</div>';return;}
      c.innerHTML=post.blocks.map(renderBlock).join("");
      setTimeout(function(){c.querySelectorAll(".fill[data-v]").forEach(function(el){el.style.width=el.dataset.v+"%";});},200);
    }
    function renderProjectos(list){
      var ul=document.getElementById("plist");
      if(!list||!list.length){ul.innerHTML='<li style="color:#222;font-family:VT323,monospace;padding:12px 0">Sem projetos</li>';return;}
      ul.innerHTML=list.map(function(p){return'<li><a href="'+ea(p.url)+'" target="_blank" rel="noopener">'+eh(p.name)+'</a></li>';}).join("");
    }
    function renderXBtns(btns){
      var a=document.getElementById("xbtns");
      a.innerHTML=(btns||[]).map(function(b){return'<a class="xbtn" href="'+ea(b.url)+'" target="_blank" rel="noopener">'+eh(b.label)+'</a>';}).join("");
    }
    document.getElementById("btnp").onclick=function(){document.getElementById("overlay").classList.add("open");};
    document.getElementById("mclose").onclick=function(){document.getElementById("overlay").classList.remove("open");};
    document.getElementById("overlay").onclick=function(e){if(e.target===this)this.classList.remove("open");};
    document.addEventListener("keydown",function(e){if(e.key==="Escape")document.getElementById("overlay").classList.remove("open");});
    var FALLBACK={projetos:[{id:"p1",name:"ARG do Lifecraft",url:"https://foxystudio1.github.io/PC-antigo/"}]};
    fetch("https://api.jsonbin.io/v3/b/"+BIN+"/latest",{headers:{"X-Master-Key":KEY}})
      .then(function(r){return r.ok?r.json():null;})
      .then(function(j){
        var d=j?j.record:FALLBACK;
        applySettings(d.settings);
        renderPost(d.post);
        renderProjectos(d.projetos||FALLBACK.projetos);
        renderXBtns(d.extraButtons);
      })
      .catch(function(){renderPost(null);renderProjectos(FALLBACK.projetos);renderXBtns([]);});
  </script>
</body>
</html>
